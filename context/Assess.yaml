    CurrentMortgage:
      required:
        - productType
        - currentMortgageReference
        - hasNHG
        - isExternal
        - penaltyInterestAmount
        - includePenaltyInterest
        - realEstateReference
      description: |
        * currentMortgageLoanCollection - List of Current Mortgages
        * productType - Product type of the loan
      type: object
      properties:
        currentMortgageReference:
          type: string
          format: uuid
          description: Reference of the agreement of the current mortgage
        realEstateReference:
          type: string
          format: uuid
          description: Reference of the collateral connected to the existing registration
        mortgageLender:
          type: string
          description: Lender of the current mortgage
        remainingAmount:
          minimum: 0
          type: number
          description: Amount of residual debt in the existing external mortgage
          format: decimal
        penaltyInterestAmount:
          minimum: 0
          type: number
          description: Interest penalty for early repayment of existing external mortgage
          format: decimal
        includePenaltyInterest:
          type: boolean
          description: Indicates if the interest penalty needs to be included
        hasNHG:
          type: boolean
          description: Indicates if NHG is applicable
        isExternal:
          type: boolean
          description: Indicator if the loan is external
        principal:
          minimum: 0
          type: number
          description: Principal of the mortgage
          format: decimal
        toBeRedeemed:
          type: boolean
          description: Indicates if the Current Mortgage is going to be fully redeemed
        isRedeemed:
          type: boolean
          description: Indicates if the Current Mortgage is fully redeemed
        mortgageRegistrationAmount:
          minimum: 0
          type: number
          description: Amount of the mortgage registration
          format: decimal
        actualMonthlyPaymentAmount:
          minimum: 0
          type: number
          description: Amount of the actual monthly payments for the current mortgage
          format: decimal
        ranking:
          minimum: 0
          type: integer
          description: Ranking of the registration of the CME
          format: int32
        currentMortgageLoanCollection:
          $ref: '#/components/schemas/CurrentMortgageLoanCollection'
      additionalProperties: false
    
    CurrentMortgageLoanCollection:
      required:
        - currentMortgageLoan
      type: object
      properties:
        currentMortgageLoan:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/CurrentMortgageLoan'
          description: Group containing one or more current mortgage loan
      additionalProperties: false
    
    CurrentMortgageLoan:
      required:
        - productType
        - remainingLoanAmount
        - repaymentMethod
        - startDate
        - toBeRedeemed
        - loanTermInMonths
        - interestPeriod
        - originalLoanTermInMonths
        - interestRatePercentage
        - endDate
      type: object
      description: |
        * repaymentMethod - Repayment method of the loan
        * productType - Product type of the loan
      properties:
        productType:
          $ref: '#/components/schemas/ProductType'
        toBeRedeemed:
          type: boolean
          description: Indicator of whether the loan will be redeemed
        repaymentMethod:
          $ref: '#/components/schemas/RepaymentMethod'
        interestRateFixedUntil:
          type: string
          description: Fixed interest period of the loan
          format: date
        startDate:
          type: string
          description: Start date of the loan
          format: date
        originalLoanTermInMonths:
          type: integer
          description: The original term when this mortgage loan was taken out
          format: int32
          minimum: 0
        principal:
          minimum: 0
          type: number
          description: Amount of the loan part
          format: decimal
        remainingLoanAmount:
          minimum: 0
          type: number
          description: Remaining amount of the loan
          format: decimal
        hasNHG:
          type: boolean
          description: Indicates whether the current mortgage loan part enjoys NHG
        number:
          type: string
          description: The (contract) number of the loan part
          pattern: '^[a-zA-Z0-9-\s\.]{1,40}$'
