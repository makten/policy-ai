openapi: 3.0.3
info:
  title: assess mortgage application api
  version: 3.56.0
  description: |
    ## General rules:
    * DateTimes are formatted as ISO-8601(yyyy-MM-dd'T'HH:mm:ss'Z')
    * Dates are formatted as ISO-8601(yyyy-MM-dd) 
    * Booleans are are formatted as 'true' or 'false'
    * Decimals are separated by . symbol

paths:
  /api/v3/assess/assess-mortgage-application:
    post:
      tags:
        - Assess
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssessMortgageApplicationRequest"
        required: true
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViolationProblemDetails"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    ################################################################################################################################################
    #  AssessMortgageApplicationRequest
    ################################################################################################################################################

    AssessMortgageApplicationRequest:
      required:
        - agreementCollection
        - applicantCollection
        - arrangementType
        - assessmentCorrelationReference
        - assessmentType
        - businessProcessReference
        - channel
        - deedPassingInformation
        - financialStructureReference
        - financingCosts
        - hasNHG
        - originalApplicationDate
        - bindingOfferDate
        - dossierReference
        - processReference
        - productLineReference
        - realEstateCollection
        - referenceDate
        - registrationCollection
        - whitelabelInformation
        - actualPurchasePrice
      type: object
      description: |
        * assessmentType - 'PreliminaryOffer' / 'BindingOffer' OR if it is Force and if Lending always use 'FinalAcceptance'
        * channel - Application from 'localbank' route or 'intermediary' route
        * deedPassingInformation - Group containing deed passing information
        * applicantCollection - Group containing one or more mortgage applicants
        * realEstateCollection - Group containing one or more realestates to acquire
        * registrationCollection - Group containing the mortgage registration
        * insuranceCollection - Group containing the insurances
        * currentMortgageCollection - Group containing current mortgages
        * agreementCollection - Group containing agreements
        * combinationCollection -Group containing combinations
        * constructionAccount - Group containing a construction account
        * financingCosts - Group containing the mortgage financing costs
        * spendingTargetType - Financing objective for the mortgage application
        * arrangementType - Arrangement type
      properties:
        financialStructureReference:
          type: string
          format: uuid
          description: Financial structure reference
        productLineReference:
          type: string
          description: Reference to a productline in FORCE
        assessmentType:
          $ref: "#/components/schemas/AssessmentType"
        assessmentCorrelationReference:
          type: string
          format: uuid
          description: Assessment correlation reference
        channel:
          $ref: "#/components/schemas/ChannelType"
        dossierReference:
          type: string
          description: Dossier reference
        processReference:
          type: string
          format: uuid
          description: Process reference
        businessProcessReference:
          type: string
          format: uuid
          description: Business process reference
        referenceDate:
          type: string
          description: Reference date of the request
          format: date-time
        originalApplicationDate:
          type: string
          description: The original application date
          format: date
        bindingOfferDate:
          type: string
          description: Date on which the Binding Offer is issued
          format: date
        hasNHG:
          type: boolean
          description: Indicates if NHG is applicable
        hasPreliminaryNote:
          type: boolean
          description: Indicates if the application has a preliminary note
        actualPurchasePrice:
          minimum: 0
          type: number
          description: The Total Purchase Price calculated by FPS for NHG requests
          format: decimal
        isPreview:
          type: boolean
          description: Indicates if it is a preview request
        deedPassingInformation:
          $ref: "#/components/schemas/DeedPassingInformation"
        applicantCollection:
          $ref: "#/components/schemas/ApplicantCollection"
        realEstateCollection:
          $ref: "#/components/schemas/RealEstateCollection"
        registrationCollection:
          $ref: '#/components/schemas/RegistrationCollection'
        insuranceCollection:
          $ref: "#/components/schemas/InsuranceCollection"
        currentMortgageCollection:
          $ref: '#/components/schemas/CurrentMortgageCollection'
        agreementCollection:
          $ref: '#/components/schemas/AgreementCollection'
        combinationCollection:
          $ref: '#/components/schemas/CombinationCollection'
        constructionAccount:
          $ref: "#/components/schemas/ConstructionAccount"
        financingCosts:
          $ref: "#/components/schemas/FinancingCosts"
        spendingTargetType:
          $ref: "#/components/schemas/SpendingTargetType"
        arrangementType:
          $ref: "#/components/schemas/ArrangementType"
        calculationsInformation:
          $ref: "#/components/schemas/CalculationsInformation"
        nhgInformation:
          $ref: "#/components/schemas/NHGInformation"
        bkrInformation:
          $ref: "#/components/schemas/BKRInformation"
        whitelabelInformation:
          $ref: "#/components/schemas/WhitelabelInformation"
        explainCollection:
          $ref: "#/components/schemas/ExplainCollection"
        intermediaryInformation:
          $ref: "#/components/schemas/IntermediaryInformation"
        moralityInformation:
          $ref: "#/components/schemas/MoralityInformation"
        suspensoryConditionCollection:
          $ref: "#/components/schemas/SuspensoryConditionCollection"
      additionalProperties: false

    ################################################################################################################################################
    #  Applicant
    ################################################################################################################################################

    ApplicantCollection:
      required:
        - applicants
      type: object
      properties:
        applicants:
          minItems: 1
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/ApplicantBase"
          description: Group containing one or more mortgage applicants
      additionalProperties: false

    ApplicantBase:
      required:
        - applicantSequenceNumber
        - applicantType
        - correspondenceName
        - dateOfBirth
        - gender
        - homeAddressBase
        - initials
        - isFirstMortgageEver
      type: object
      discriminator:
        propertyName: "applicantType"
        mapping:
          GuarantorParty: "#/components/schemas/GuarantorParty"
          InsuranceBeneficiaryParty: "#/components/schemas/InsuranceBeneficiaryParty"
          InsuredParty: "#/components/schemas/InsuredParty"
          LiableParty: "#/components/schemas/LiableParty"
          PendingDismissalLiableParty: "#/components/schemas/PendingDismissalLiableParty"
      description: |
        * gender - Gender
        * homeAddressBase - Applicant home address information
      properties:
        applicantType:
          type: string
          description: Applicant type
        applicantSequenceNumber:
          minimum: 0
          type: integer
          description: Sequence number of the applicant within the request
          format: int32
        externalPartyReference:
          maxLength: 50
          type: string
          description: External reference of the applicant
        gender:
          $ref: "#/components/schemas/Gender"
        initials:
          maxLength: 20
          type: string
          description: Initials
        correspondenceNamePreposition:
          maxLength: 20
          type: string
          description: Preposition of the correspondence name
        correspondenceName:
          maxLength: 40
          type: string
          description: Correspondence name
        dateOfBirth:
          type: string
          description: Date of birth
          format: date
        homeAddressBase:
          $ref: "#/components/schemas/AddressBase"
        isFirstMortgageEver:
          type: boolean
          description: Indicates whether the applicant applies for its first mortgage ever
        employersStatementDate:
          type: string
          description: Oldest date found on an employers statement with an income for this applicant
          format: date
        paySlipDate:
          type: string
          description: Oldest date found on a payslip with an income for this applicant
          format: date
        prospectiveIncomeStatementDate:
          type: string
          description: Oldest date found on a prospective income statement with an income for this applicant
          format: date
        incomeStatementDate:
          type: string
          description: Oldest date found on a income statement with an income for this applicant
          format: date
        perspectiveStatementDate:
          type: string
          description: Oldest date found on a perspective statement with an income for this applicant
          format: date
        totalYearlyIncome:
          type: number
          format: decimal
          description: Total yearly income optional
        uwvInsuranceMessageDate:
          type: string
          description: Date of the eldest UWV insurance message for this applicant
          format: date
        isForeignBKRCheckRequired:
          type: boolean
          description: Indication whether a foreign BKR check is required for this applicant
        isCustomerWithEmploymentAfterRetirement:
          type: boolean
          description: Indicates whether customer is employed after retirement
        isCustomerWithPensionAndPayrollIncome:
          type: boolean
          description: Indicates whether customer has payroll income after retirement
        calculatedAnnualIncome:
          type: number
          format: decimal
      additionalProperties: false

    LiableOrGuarantorParty:
      required:
        - countryOfNationality
        - foreignTaxpayer
        - hasBeenDivorced
        - maritalStatus
      type: object
      description: |
        * maritalStatus - Marital status
        * identificationType - Identification type
        * contact - Applicant contact information
        * incomeCollection - Group containing applicant income information
        * otherIncomeCollection - Group containing other income sources
        * obligationCollection - Group containing applicant obligations information
        * bkrObligationCollection - Group containing BKR obligations per applicant
      allOf:
        - $ref: "#/components/schemas/ApplicantBase"
      properties:
        countryOfNationality:
          pattern: '^\d{3}'
          type: string
          description: Nationality
        maritalStatus:
          $ref: "#/components/schemas/MaritalStatus"
        hasBeenDivorced:
          type: boolean
          description: Indicates if the applicant has been divorced
        foreignTaxpayer:
          type: boolean
          description: Indicates if the applicant is a foreign taxpayer
        reducedIncome:
          minimum: 0
          type: number
          description: Monthly reduced income amount. Mandatory if NHG is true
          format: decimal
        startDateReducedIncome:
          type: string
          description: Start date of the reduced income
          format: date
        relevantIncomeExcludingOtherIncome:
          minimum: 0
          type: number
          description: The relevant income excluding other income
          format: decimal
        identificationNumber:
          type: string
          description: Identification number
        isInSpecialServicing:
          type: boolean
          description: Indicates whether applicant is in special servicing
        isBlocked:
          type: boolean
          description: Indicates whether the applicant is blocked
        blockedReasons:
          type: array
          items:
            type: string
          description: Reasons why the applicant is blocked
        countryOfBirth:
          pattern: '^\d{3}'
          type: string
          description: Country of birth
        placeOfBirth:
          type: string
          description: Place of birth
        identificationType:
          $ref: "#/components/schemas/IdentificationType"
        contact:
          $ref: "#/components/schemas/Contact"
        incomeCollection:
          $ref: "#/components/schemas/IncomeCollection"
        otherIncomeCollection:
          $ref: "#/components/schemas/OtherIncomeCollection"
        obligationCollection:
          $ref: "#/components/schemas/ObligationCollection"
        bkrObligationCollection:
          $ref: "#/components/schemas/BKRObligationCollection"
        iblIncome:
          $ref: "#/components/schemas/IBLIncome"
      additionalProperties: false

    GuarantorParty:
      type: object
      allOf:
        - $ref: "#/components/schemas/LiableOrGuarantorParty"
      additionalProperties: false

    InsuranceBeneficiaryParty:
      type: object
      allOf:
        - $ref: "#/components/schemas/ApplicantBase"
      additionalProperties: false

    InsuredParty:
      type: object
      allOf:
        - $ref: "#/components/schemas/ApplicantBase"
      additionalProperties: false

    LiableParty:
      type: object
      allOf:
        - $ref: "#/components/schemas/LiableOrGuarantorParty"
      additionalProperties: false
    
    PendingDismissalLiableParty:
      type: object
      allOf:
        - $ref: "#/components/schemas/ApplicantBase"
      additionalProperties: false

    BKRObligationCollection:
      required:
        - bkrObligations
      type: object
      properties:
        bkrObligations:
          minItems: 1
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/BKRObligation"
          description: Group containing one or more BKR obligations
      additionalProperties: false

    BKRObligation:
      required:
        - bkrObligationType
        - calculatedMonthlyAmount
        - creditType
        - entryDate
        - isToBeRepaid
        - principal
        - status
      type: object
      discriminator:
        propertyName: "bkrObligationType"
        mapping:
          BKRObligationAddedFromRegister: "#/components/schemas/BKRObligationAddedFromRegister"
          BKRObligationManuallyAdded: "#/components/schemas/BKRObligationManuallyAdded"
      description: |
        * creditType - The type of credit denoted by the BKR abbreviation
        * status - Status type
        * arrear - Arrear
        * repaymentMethod - The repayment method of the BKR obligation
      properties:
        bkrObligationType:
          type: string
          description: BKR obligation type
        creditType:
          $ref: "#/components/schemas/CreditType"
        principal:
          minimum: 0
          type: number
          description: Principal
          format: decimal
        calculatedMonthlyAmount:
          minimum: 0
          type: number
          description: Monthly amount calculated based on principal
          format: decimal
        entryDate:
          type: string
          description: Entry date
          format: date
        theoreticalRepaymentDate:
          type: string
          description: Theoretical final repayment date of the obligation
          format: date
        practicalRepaymentDate:
          type: string
          description: Practical final repayment date of the obligation
          format: date
        monthlyAmount:
          minimum: 0
          type: number
          description: Monthly amount
          format: decimal
        status:
          $ref: "#/components/schemas/StatusType"
        isToBeRepaid:
          type: boolean
          description: Indicates if the obligation should be repaid before passing the deed
        arrear:
          $ref: "#/components/schemas/Arrear"
        withdrawnAmount:
          minimum: 0
          type: number
          description: Withdrawn amount
          format: decimal
        box1:
          type: boolean
          description: Indicates of the BKR obligation is box1 or not
        repaymentMethod:
          $ref: "#/components/schemas/BKRRepaymentMethod"
        hasRelevantHCode:
          type: boolean
          description: Indicates if the BKR obligation has a relevant H code
        firstRepaymentDate:
          type: string
          description: Date at which the first repayment for the BKR contract was made.
          format: date
      additionalProperties: false

    BKRObligationAddedFromRegister:
      type: object
      allOf:
        - $ref: "#/components/schemas/BKRObligation"
      additionalProperties: false

    BKRObligationManuallyAdded:
      type: object
      allOf:
        - $ref: "#/components/schemas/BKRObligation"
      additionalProperties: false

    Arrear:
      required:
        - arrearCodeType
        - week
        - year
      type: object
      description: |
        * arrearCodeType - Possible arear code as registered by BKR
        * arrearRecovery - Arrear recovery
      properties:
        arrearCodeType:
          $ref: "#/components/schemas/ArrearCodeType"
        year:
          pattern: '^\d{1,4}$'
          type: integer
          description: Year of registration of the arear
          format: int32
        week:
          pattern: "^([1-9]|[1-4][0-9]|5[0-2])$"
          type: integer
          description: Week of registration of the arear
          format: int32
        arrearRecovery:
          $ref: "#/components/schemas/ArrearRecovery"
      additionalProperties: false

    ArrearRecovery:
      required:
        - week
        - year
      type: object
      properties:
        year:
          pattern: '^\d{1,4}$'
          type: integer
          description: Year of registration of the arear recover
          format: int32
        week:
          pattern: "^([1-9]|[1-4][0-9]|5[0-2])$"
          type: integer
          description: Week of registration of the arear recovery
          format: int32
      additionalProperties: false

    Contact:
      type: object
      properties:
        phoneNumberHome:
          maxLength: 30
          type: string
          description: Home phone number
        phoneNumberWork:
          maxLength: 30
          type: string
          description: Work phone number
        phoneNumberMobile:
          maxLength: 30
          type: string
          description: Mobile phone number
        emailAddress:
          type: string
          description: Email address
          format: email
      additionalProperties: false
    
    AddressBase:
      required:
        - country
      type: object
      discriminator:
        propertyName: "addressType"
        mapping:
          AddressNetherlands: "#/components/schemas/AddressNetherlands"
          AddressForeign: "#/components/schemas/AddressForeign"
      properties:
        country:
          pattern: '^\d{3}'
          type: string
          description: Country
        municipality:
          maxLength: 40
          type: string
          description: Municipality
      additionalProperties: false

    AddressNetherlands:
      required:
        - city
        - houseNumber
        - postalCode
        - street
      type: object
      allOf:
        - $ref: "#/components/schemas/AddressBase"
      properties:
        street:
          maxLength: 40
          type: string
          description: Street
        houseNumber:
          type: integer
          description: House number
          format: int32
        houseNumberAddition:
          maxLength: 20
          type: string
          description: House number addition
        postalCode:
          pattern: '^[0-9]{4}[ ]?[A-Za-z]{2}$'
          type: string
          description: Postal code
        city:
          maxLength: 40
          type: string
          description: City
      additionalProperties: false

    AddressForeign:
      type: object
      allOf:
        - $ref: "#/components/schemas/AddressBase"
      properties:
        street:
          maxLength: 40
          type: string
          description: Street
        houseNumber:
          type: integer
          description: House number
          format: int32
        houseNumberAddition:
          maxLength: 20
          type: string
          description: House number addition
        postalCode:
          pattern: '^[a-zA-Z0-9-\s]{1,10}$'
          type: string
          description: Postal code
        city:
          maxLength: 40
          type: string
          description: City
      additionalProperties: false
    
    IBLIncome:
      required:
        - annualIncome
        - hasWageGarnishment
        - totalPensionContribution
        - startDate
      type: object
      properties:
        annualIncome:
          type: number
          description: Yearly income IBL
          format: decimal
        hasWageGarnishment:
          type: boolean
          description: Indicates if the salary of the employment is being legally seized
        paySlipDate:
          type: string
          description: Oldest date found on a payslip with an income for this applicant
          format: date
        totalPensionContribution:
          minimum: 0
          type: number
          description: Total monthly contribution from salary to applicant's pension
          format: decimal
        uwvInsuranceMessageDate:
          type: string
          description: Date of the eldest UWV insurance message for this applicant
          format: date
        startDate:
          type: string
          description: The start date of the income
          format: date
        endDate:
          type: string
          description: The end date of this income
          format: date
        calculationTypesUsed:
          type: string
          description: The calculation types used for this income
        assessmentIncomeFixedPart:
          type: number
          description: The fixed part of the income used for assessment
          format: decimal
        assessmentIncomeVariablePart:
          type: number
          description: The variable part of the income used for assessment
          format: decimal
      additionalProperties: false
    
    IncomeCollection:
      required:
        - incomes
      type: object
      properties:
        incomes:
          minItems: 1
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Income"
          description: Group containing applicant income information
      additionalProperties: false

    Income:
      required:
        - annualIncome
        - incomeType
        - startDate
      type: object
      discriminator:
        propertyName: "incomeType"
        mapping:
          Employment: "#/components/schemas/Employment"
          SelfEmployment: "#/components/schemas/SelfEmployment"
          SupplementBenefit: "#/components/schemas/SupplementBenefit"
      properties:
        incomeType:
          type: string
          description: Income type
        startDate:
          type: string
          description: Income start date
          format: date
        endDate:
          type: string
          description: Income end date
          format: date
        annualIncome:
          type: number
          description: Annual income amount
          format: decimal
        baseIncome:
          type: number
          description: Base income amount
          format: decimal
        country:
          pattern: '^\d{3}'
          type: string
          description: Country
        futureIncome:
          $ref: "#/components/schemas/FutureIncome"
        totalAnnualIncome:
          type: number
          description: Total annual income amount
          format: decimal
      additionalProperties: false

    SupplementBenefit:
      required:
        - holidayPay
        - incomePeriod
        - supplementBenefitType
        - taxFree
      type: object
      description: |
        * supplementBenefitType - Type of supplemental benefit
        * incomePeriod - Income pay period
      allOf:
        - $ref: "#/components/schemas/Income"
      properties:
        supplementBenefitType:
          $ref: "#/components/schemas/SupplementBenefitType"
        incomePeriod:
          $ref: "#/components/schemas/IncomePeriod"
        holidayPay:
          minimum: 0
          type: number
          description: The amount of holiday pay
          format: decimal
        taxFree:
          type: boolean
          description: Indicates if the income is tax free
        holidayVoucher:
          minimum: 0
          type: number
          description: HolidayVoucher on supplement benefit
          format: decimal
      additionalProperties: false

    Employment:
      required:
        - cashPayment
        - employmentType
        - hasWageGarnishment
        - incomePeriod
        - majorShareholder
        - probationaryPeriod
        - isFlexWork
      type: object
      description: |
        * employmentType - Type of employment
        * incomePeriod - Income pay period
        * wageAdditions - Additional income wages
        * annualIncomeHistory - Annual income history
      allOf:
        - $ref: "#/components/schemas/Income"
      properties:
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
        majorShareholder:
          type: boolean
          description: Indicates if the applicant is a major shareholder
        incomePeriod:
          $ref: "#/components/schemas/IncomePeriod"
        wageAdditions:
          $ref: "#/components/schemas/WageAdditions"
        cashPayment:
          type: boolean
          description: Indicates if the income is payed in cash
        hasWageGarnishment:
          type: boolean
          description: Indicates if a wage garnishment is applicable
        probationaryPeriod:
          type: boolean
          description: Indicates if a propationary period is applicable
        hasProbationaryPeriodEnded:
          type: boolean
          description: Indicator or probationary period has expired
        probationaryEndedDate:
          type: string
          description: Probationary period ended date
          format: date
        isFlexWork:
          type: boolean
          description: Indicates if this employment is flexwork
        flexibleBudget:
          type: number
          description: FixedFlexibleBudget contains the new information mentioned by NHG on the employer's statement
          format: decimal
        totalYearlyIncome:
          type: number
          format: decimal
          description: Total yearly income
        annualIncomeHistory:
          $ref: "#/components/schemas/AnnualIncomeHistory"
      additionalProperties: false

    SelfEmployment:
      required:
        - annualIncomeHistory
        - liberalProfession
        - selfEmploymentType
        - taxFree
      type: object
      description: |
        * selfEmploymentType - Type of self employment
        * legalEntity - Type of legal entity
        * annualIncomeHistory - Annual income history
      allOf:
        - $ref: "#/components/schemas/Income"
      properties:
        selfEmploymentType:
          $ref: "#/components/schemas/SelfEmploymentType"
        legalEntity:
          $ref: "#/components/schemas/LegalEntity"
        taxFree:
          type: boolean
          description: Indicates if the income is tax free
        liberalProfession:
          type: boolean
          description: Indicates if the profession is liberal
        annualIncomeHistory:
          $ref: "#/components/schemas/AnnualIncomeHistory"
        applicationNumberBOI:
          type: string
          description: Application number of the "bepaling ondernemersinkomen" document
      additionalProperties: false

    AnnualIncomeHistory:
      required:
        - annualIncomeCurrentYearMinus1
        - annualIncomeCurrentYearMinus2
        - annualIncomeCurrentYearMinus3
      type: object
      properties:
        annualIncomeCurrentYearMinus1:
          type: number
          description: Income from previous year
          format: decimal
        annualIncomeCurrentYearMinus2:
          type: number
          description: Income from previous year
          format: decimal
        annualIncomeCurrentYearMinus3:
          type: number
          description: Income from previous year
          format: decimal
      additionalProperties: false

    WageAdditions:
      type: object
      properties:
        holidayPay:
          minimum: 0
          type: number
          description: Holiday pay amount
          format: decimal
        irregularityAllowance:
          minimum: 0
          type: number
          description: Irregularity allowance amount
          format: decimal
        commission:
          minimum: 0
          type: number
          description: Provision amount
          format: decimal
        overtime:
          minimum: 0
          type: number
          description: Overtime income amount
          format: decimal
        fixedExtraMonthPayment:
          minimum: 0
          type: number
          description: Fixed extra month payment
          format: decimal
        endOfYearBonus:
          minimum: 0
          type: number
          description: End of year bonus
          format: decimal
        militaryAllowance:
          minimum: 0
          type: number
          description: Military allowance
          format: decimal
        bonus:
          minimum: 0
          type: number
          description: Extra bonus
          format: decimal
        holidayVoucher:
          minimum: 0
          type: number
          description: Holiday voucher on employment
          format: decimal
        positionalAllowance:
          minimum: 0
          type: number
          description: The relevant total amount allowance
          format: decimal
      additionalProperties: false

    ObligationCollection:
      required:
        - obligations
      type: object
      properties:
        obligations:
          minItems: 1
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Obligation"
          description: Group containing applicant obligations information
      additionalProperties: false

    Obligation:
      required:
        - obligationType
      type: object
      discriminator:
        propertyName: "obligationType"
        mapping:
          ChildSupport: "#/components/schemas/ChildSupport"
          LoanFromEmployer: "#/components/schemas/LoanFromEmployer"
          Other: "#/components/schemas/Other"
          PartnerAlimony: "#/components/schemas/PartnerAlimony"
          PensionPremium: "#/components/schemas/PensionPremium"
          PrivateLoan: "#/components/schemas/PrivateLoan"
          Rentalcharges: "#/components/schemas/Rentalcharges"
          StudentLoan: "#/components/schemas/StudentLoan"
          TelecommunicationsFacility: "#/components/schemas/TelecommunicationsFacility"
          ClosedEndCredit: "#/components/schemas/ClosedEndCredit"
          ThirdPartyLoanForOwnHome: "#/components/schemas/ThirdPartyLoanForOwnHome"
      properties:
        obligationType:
          type: string
          description: Obligation type
        monthlyAmount:
          minimum: 0
          type: number
          description: The monthly obligatory amount
          format: decimal
        startDate:
          type: string
          description: Start date of obligatory period
          format: date
        endDate:
          type: string
          description: End date of obligatory period
          format: date
      additionalProperties: false

    ChildSupport:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      additionalProperties: false

    PartnerAlimony:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        payoffThroughMortgage:
          type: boolean
          description: Indication if the alimony will be paid off through the mortgage
      additionalProperties: false

    Rentalcharges:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        payoffThroughMortgage:
          type: boolean
          description: Indication if the rental charges will be paid off through the mortgage
      additionalProperties: false

    TelecommunicationsFacility:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      additionalProperties: false

    ClosedEndCredit:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      additionalProperties: false

    PensionPremium:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      additionalProperties: false

    Other:
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        principal:
          minimum: 0
          type: number
          description: The original loan amount
          format: decimal
      additionalProperties: false

    LoanFromEmployer:
      required:
        - originalAmount
      type: object
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        originalAmount:
          minimum: 0
          type: number
          description: Original amount of the loan
          format: decimal
        calculatedMonthlyAmount:
          type: number
          description: Calculated monthly amount of the loan
          format: decimal
      additionalProperties: false

    StudentLoan:
      required:
        - originalAmount
        - repaymentArrangement
      type: object
      description: |
        * repaymentArrangement - Period indication, deciding the payback method
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        repaymentArrangement:
          $ref: "#/components/schemas/RepaymentArrangementType"
        originalAmount:
          minimum: 0
          type: number
          description: Original amount of the loan
          format: decimal
        remainingAmount:
          type: number
          description: The remaining amount of the loan
          format: decimal
        legalMonthlyAmount:
          type: number
          description: The legal monthly amount
          format: decimal
        calculatedMonthlyAmountWithoutIncrement:
          minimum: 0
          type: number
          description: The student loan repayment amount the applicant pays without the mandatory increment
          format: decimal
        interestRate:
          minimum: 0
          maximum: 1
          type: number
          description: The interest rate as a value between 1 and 0
          format: decimal
        actualMonthlyAmount:
          type: number
          description: Actual monthly amount for the student loan
          format: decimal
        remainingDurationInMonths:
          type: integer
          description: The number of months left until the student loan is fully repaid.
          format: int32
        saldoDate:
          type: string
          description: |
            The date that is mentioned in the DUO Afgiftebrief/Notice letter in which the newly determined monthly amount is determined, 
            based on the remaining debt, remaining duration and interest percentage
          format: date
      additionalProperties: false

    PrivateLoan:
      required:
        - canBeUsedWithActualObligationAmount
      type: object
      description: |
        * box1 - Private Loan Box1 information
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        principal:
          minimum: 0
          type: number
          description: The annual obligatory amount
          format: decimal
        box1:
          $ref: "#/components/schemas/Box1"
        calculatedMonthlyAmount:
          type: number
          description: Calculated monthly amount of the loan
          format: decimal
        canBeUsedWithActualObligationAmount:
          type: boolean
          description: Indication if this obligation can be used in all checks with the actual monthly amount
      additionalProperties: false

    ThirdPartyLoanForOwnHome:
      required:
        - nonTaxDeductibleAmount
        - interestRate
        - remainingAmount
        - fixedInterestPeriodEndDate
        - payoffThoughMortgage
        - repaymentMethod
        - productType
      type: object
      description: |
        * repaymentMethod - Repayment method
        * productType - Product type of the loan
      allOf:
        - $ref: "#/components/schemas/Obligation"
      properties:
        nonTaxDeductibleAmount:
          type: number
          description: Non tax deductible loan amount of the current mortgage loan
          format: decimal
        interestRate:
          type: number
          description: Interest percentage of the loan part of the current mortgage
          format: decimal
        remainingAmount:
          type: number
          description: Remaining amount of the principal
          format: decimal
        fixedInterestPeriodEndDate:
          type: string
          description: Fixed interest period end date
          format: date
        fiscalEndDate:
          type: string
          description: The fiscal end date
          format: date
        payoffThoughMortgage:
          type: boolean
          description: Payoff though mortgage
        realEstateReference:
          type: string
          description: Reference of the collateral
          format: uuid
        originalLoanTermInMonths:
          type: integer
          description: The original term when this mortgage loan was taken out
          format: int32
        actualMonthlyAmount:
          type: number
          description: Actual monthly amount for the student loan
          format: decimal
        loanNumber:
          type: string
          description: Loan number
        repaymentMethod:
          $ref: "#/components/schemas/RepaymentMethod"
        productType:
          $ref: "#/components/schemas/ProductType"
      additionalProperties: false

    Box1:
      required:
        - fixedInterestPeriodEndDate
        - interestPercentage
      type: object
      description: |
        * repaymentMethod - Repayment method
        * productType - Product type
      properties:
        interestPercentage:
          minimum: 0
          type: number
          description: Interest Percentage
          format: decimal
        fixedInterestPeriodEndDate:
          type: string
          description: Fixed interest period end date
          format: date
        repaymentMethod:
          $ref: "#/components/schemas/RepaymentMethod"
      additionalProperties: false

    OtherIncomeCollection:
      required:
        - otherIncomes
      type: object
      properties:
        otherIncomes:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/OtherIncome"
          description: Group containing other income sources
      additionalProperties: false

    OtherIncome:
      required:
        - annualIncome
        - otherIncomeType
        - startDate
        - taxCategoryType
      type: object
      description: |
        * otherIncomeType - The type of other income
        * taxCategoryType - The type of tax
      properties:
        otherIncomeType:
          $ref: "#/components/schemas/OtherIncomeType"
        taxCategoryType:
          $ref: "#/components/schemas/TaxCategoryType"
        annualIncome:
          type: number
          description: Property transfer tax amount
          format: decimal
        baseIncome:
          type: number
          description: Base income amount
          format: decimal
        isPledged:
          type: boolean
          description: Indicates whether the income is pledged
        startDate:
          type: string
          description: Start date of the income
          format: date
        endDate:
          type: string
          description: End date of the income
          format: date
        applicationNumberBOI:
          type: string
          description: Application number of the "bepaling ondernemersinkomen" document
      additionalProperties: false

    FutureIncome:
      required:
        - expectedIncome
        - expectedStartDate
      type: object
      description: |
        * Future income of an employment 
      properties:
        expectedIncome:
          type: number
          description: The expected future amount of income that the applicant will obtain
          format: decimal
          nullable: false
        expectedStartDate:
          type: string
          description: The expected date when the future income starts
          format: date
          nullable: false
      additionalProperties: false

    ################################################################################################################################################
    #  AssessTypes
    ################################################################################################################################################

    ArrangementType:
      enum:
        - FirstMortgage
        - Remortgage
        - NoArrangement
        - SequentialMortgageSameLender
        - SequentialMortgageOtherLender
        - FurtherAdvance
        - Conversion
        - ConversionAndAdvance
        - ConversionAndSequentialMortgage
        - ContinuationNewInterest
        - ContinuationMortgage
        - SecondOrHigherInRankMortgage
        - RelayMortgage
      type: string

    AssessmentType:
      enum:
        - PreliminaryOffer
        - BindingOffer
        - FinalAcceptance
      type: string

    ChannelType:
      enum:
        - ExternalFrontOffice
        - HDN
      type: string

    SpendingTargetType:
      enum:
        - PurchaseHouse
        - AcquisitionFromUndistributedInventory
        - RefinancingWithoutIncrease
        - LeaseholdRedemption
        - Divorce
        - QualityImprovement
        - AcquisitionFullOwnership
        - ImprovedClientSituation
        - Multiple
        - FinanceChangeCosts
        - RefinanceSVNStarterLoan
      type: string

    ################################################################################################################################################
    #  FinancingCosts
    ################################################################################################################################################

    FinancingCosts:
      required:
        - advisoryCosts
        - brokerCosts
        - conveyancingCosts
        - mortgageDeedCosts
        - propertyTransferTax
        - valuationCosts
        - totalPurchaseCosts
      type: object
      properties:
        advisoryCosts:
          minimum: 0
          type: number
          description: Advisory costs amount
          format: decimal
        conveyancingCosts:
          minimum: 0
          type: number
          description: Conveying costs amount
          format: decimal
        mortgageDeedCosts:
          minimum: 0
          type: number
          description: Mortgage deed costs amount
          format: decimal
        brokerCosts:
          minimum: 0
          type: number
          description: Broker costs amount
          format: decimal
        valuationCosts:
          minimum: 0
          type: number
          description: Valuation costs amount
          format: decimal
        propertyTransferTax:
          minimum: 0
          type: number
          description: Property transfer tax amount
          format: decimal
        engineeringReportCosts:
          minimum: 0
          type: number
          description: Engineering report costs amount
          format: decimal
        reimbursementToExPartner:
          minimum: 0
          type: number
          description: Disbursement to ex-partner in case of divorce
          format: decimal
        reimbursementToHeirs:
          minimum: 0
          type: number
          description: Disbursement to heirs
          format: decimal
        interestRenewalPenalty:
          minimum: 0
          type: number
          description: Interest renewal penalty
          format: decimal
        changeFees:
          minimum: 0
          type: number
          description: Change Fees
          format: decimal
        redemptionSVNStartersLoan:
          minimum: 0
          type: number
          description: Change Fees
          format: decimal
        closingCosts:
          minimum: 0
          type: number
          description: Closing Costs amount
          format: decimal
        notaryCosts:
          minimum: 0
          type: number
          description: Notary Costs amount
          format: decimal
        additionalCosts:
          minimum: 0
          type: number
          description: Additional costs
          format: decimal
        currentLoanInterestPercentage:
          minimum: 0
          type: number
          description: Current loan interest percentage
          format: decimal
        currentLoanRemainingFixedInterestPeriodeInMonths:
          minimum: 0
          type: integer
          description: Current loan remaining fixed interest periode in months
          format: int32
        totalPurchaseCosts:
          minimum: 0
          type: number
          description: Total purchase costs
          format: decimal
      additionalProperties: false

    ################################################################################################################################################
    #  ConstructionAccount
    ################################################################################################################################################

    ConstructionAccount:
      required:
        - depositAmount
      type: object
      properties:
        depositAmount:
          minimum: 0
          type: number
          description: The deposit amount
          format: decimal
        totalCurrentBalanceExcludingOwnResources:
          type: number
          format: decimal
        sectionCollection:
          $ref: "#/components/schemas/SectionCollection"
      additionalProperties: false

    SectionCollection:
      required:
        - sections
      type: object
      properties:
        sections:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/Section'
          description: Group containing one or more sections
      additionalProperties: false

    Section:
      required:
        - description
        - disburseDuringDeedPassing
      type: object
      properties:
        description:
          type: string
          description: The description for this section
        disburseDuringDeedPassing:
          type: boolean
          description: Indicates whether the amount will be disbursed during deed passing
      additionalProperties: false

    ################################################################################################################################################
    #  Insurance
    ################################################################################################################################################

    InsuranceCollection:
      required:
        - insurances
      type: object
      properties:
        insurances:
          minItems: 1
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Insurance"
          description: Group containing the insurances
      additionalProperties: false

    Insurance:
      required:
        - insurancePremiumTermInMonths
        - insuranceReference
        - insuranceTermInMonths
        - insuranceType
        - isExistingPolicy
      type: object
      discriminator:
        propertyName: "insuranceType"
        mapping:
          IncomeInsurance: "#/components/schemas/IncomeInsurance"
      properties:
        insuranceType:
          type: string
          description: Insurance type
        insuranceReference:
          type: string
          format: uuid
          description: Internal technical reference insurance
        isExistingPolicy:
          type: boolean
          description: Indicates if the policy already exists
        insuranceTermInMonths:
          minimum: 0
          type: integer
          description: Insurance term in months
          format: int32
        insurancePremiumTermInMonths:
          minimum: 0
          type: integer
          description: Insurance premium term in months
          format: int32
      additionalProperties: false

    IncomeInsurance:
      required:
        - insuredApplicantCollection
      type: object
      allOf:
        - $ref: "#/components/schemas/Insurance"
      properties:
        insuredApplicantCollection:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/InsuredApplicant"
          description: Group containing one or more insured applicants
      additionalProperties: false

    InsuredApplicant:
      required:
        - applicantSequenceNumber
      type: object
      properties:
        applicantSequenceNumber:
          minimum: 0
          type: integer
          description: Sequence number of an applicant in the request
          format: int32
      additionalProperties: false

    ################################################################################################################################################
    #  Agreement - Loan
    ################################################################################################################################################
    
    AgreementCollection:
      required:
        - agreements
      type: object
      properties:
        agreements:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/Agreement'
          description: Group containing one or more agreements
      additionalProperties: false

    Agreement:
      required:
        - agreementReference
        - principal
        - isSVn
      type: object
      description: |
        * loanCollection - Group containing the mortgage loans
      properties:
        agreementReference:
          type: string
          format: uuid
          description: Reference of the Agreement
        number:
          type: string
          description: The number of the agreement part
          pattern: '^[a-zA-Z0-9-\s\.]{1,40}$'
        principal:
          minimum: 0
          type: number
          description: Principal of the agreement
          format: decimal
        remainingAmount:
          minimum: 0
          type: number
          description: Remaining amount of the principal
          format: decimal
        isSVn:
          type: boolean
          description: Indicates whether the agreement has SVN
        sumSVn:
          minimum: 0
          type: number
          description: Denotes the sum of the SVN when applicable
          format: decimal
        loanCollection:
          $ref: '#/components/schemas/LoanCollection'
        bridgingLoanCollection:
          $ref: '#/components/schemas/BridgingLoanCollection'
      additionalProperties: false

    LoanCollection:
      required:
        - loan
      type: object
      properties:
        loan:
          minItems: 1
          type: array
          items:
            $ref: "#/components/schemas/Loan"
          description: Group containing the mortgage loans structure
      additionalProperties: false

    BridgingLoanCollection:
      required:
        - bridgingLoan
      type: object
      properties:
        bridgingLoan:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/BridgingLoan'
          description: Group containing the bridging loans structure
      additionalProperties: false

    LoanBase:
      required:
        - loanReference
        - productType
        - productName
        - interestPeriodInMonths
        - loanAmount
        - loanTermInMonths
        - mutationType
        - remainingLoanAmount
        - repaymentMethod
        - productReferenceId
        - startDate
        - endDate
        - isInRRAPeriod
        - hasTRA
        - hasLoanTermChange
        - hasRepaymentMethodChanged
        - interestRateRenewalDate
        - endowmentProducts
      type: object
      description: |
        * interestOffer - Group containing interest offer information
        * repaymentMethod - Repayment method of the loan
        * mutationType - Mutation type of the loan
        * productType - Product type of the loan
      properties:
        loanReference:
          type: string
          format: uuid
          description: Internal technical reference (GUID) to the loan
        productType:
          $ref: "#/components/schemas/ProductType"
        productName:
          type: string
          description: The product name of the repayment method
        number:
          type: string
          description: The number of the agreement part
          pattern: '^[a-zA-Z0-9-\s\.]{1,40}$'
        loanAmount:
          minimum: 0
          type: number
          description: Loan amount
          format: decimal
        loanTermInMonths:
          minimum: 0
          type: integer
          description: Loan term in months
          format: int32
        productReferenceId:
          type: string
          description: The product definition reference id in FORCE
        productLineDescription:
          type: string
          description: The product line description in FORCE
        interestOffer:
          $ref: "#/components/schemas/InterestOffer"
        repaymentMethod:
          $ref: '#/components/schemas/RepaymentMethod'
        mutationType:
          $ref: '#/components/schemas/MutationType'
        interestPeriodInMonths:
          minimum: 0
          type: integer
          description: Fixed interest period of the loan in months
          format: int32
        startDate:
          type: string
          description: Start date of the loan
          format: date
        remainingLoanAmount:
          minimum: 0
          type: number
          description: Remaining amount of the loan
          format: decimal
        endDate:
          type: string
          description: End date of the loan
          format: date
        originalDurationNumberOfMonths:
          minimum: 0
          type: integer
          description: The original duration of the mortgage loan PART in months
          format: int32
        manualInterestDate:
          type: string
          description: Indicates the manual interest date when applicable
          format: date
        isInRRAPeriod:
          type: boolean
          description: Indicates whether the mortgage is the RRA period
        hasTRA:
          type: boolean
          description: Indicates whether the mortgage has a TRA
        hasLoanTermChange:
          type: boolean
          description: Indicates whether the mortgage term has changed
        hasRepaymentMethodChanged:
          type: boolean
          description: Indicates whether the mortgage repayment method has changed
        remainingInterestPeriod:
          minimum: 0
          type: integer
          description: Remaining interest period of the loan in months
          format: int32
        interestRateRenewalDate:
          type: string
          description: The date on which a new interest rate will be decided
          format: date
        interestProductBehaviour:
          $ref: "#/components/schemas/InterestProductBehaviour"
        endowmentProducts:
          type: array
          items:
            $ref: '#/components/schemas/EndowmentProduct'
          description: Group containing one or more endowment products
      additionalProperties: false

    Loan:
      required:
        - hasNHG
        - nonTaxDeductableLoanAmount
        - fiscalRegime
        - loanType
      type: object
      discriminator:
        propertyName: "loanType"
        mapping:
          ContinuationLoan: "#/components/schemas/ContinuationLoan"
          Loan: "#/components/schemas/Loan"
      allOf:
        - $ref: "#/components/schemas/LoanBase"
      description: |
        * insuranceReferenceCollection - Collection of references of insurances linked to the loan
      properties:
        nonTaxDeductableLoanAmount:
          minimum: 0
          type: number
          description: Non tax deductable loan amount
          format: decimal
        fiscalEndDate:
          type: string
          description: Date at which the tax deductibility of the loan ends
          format: date
        hasNHG:
          type: boolean
          description: Indicator if NHG is requested
        fiscalRegime:
          $ref: "#/components/schemas/FiscalRegime"
        insuranceReferenceCollection:
          $ref: "#/components/schemas/InsuranceReferenceCollection"
        numberOfManualInterestComponents:
          type: integer
          description: The number of manual interest components added to the loan
          format: int32
        endDateIsFixed:
          type: boolean
          description: |
            Indicates whether a loan has a fixed end date, meaning that it is given by the user in Force.
            The loan duration is then derived as number of months between start date and end date.
        loanType:
          type: string
          description: Loan type
        accumulatedValue:
          minimum: 0
          type: number
          description: Accumulated value of the endowment products on the loan
          format: decimal
      additionalProperties: false

    ContinuationLoan:
      type: object
      allOf:
        - $ref: "#/components/schemas/Loan"
      properties:
        parentLoan:
          $ref: "#/components/schemas/ParentLoan"
      additionalProperties: false

    ParentLoan:
      required:
        - productReference
      type: object
      properties:
        productReference:
          type: string
          description: Parent loan product reference of the continuation loan
        interestComponentCollection:
          $ref: "#/components/schemas/InterestComponentCollection"
      additionalProperties: false

    BridgingLoan:
      required:
        - realEstateReference
        - bridgingLoanType
      type: object
      description: |
        * bridgingLoanType - Type of the bridging loan
      allOf:
        - $ref: "#/components/schemas/LoanBase"
      properties:
        realEstateReference:
          type: string
          format: uuid
          description: Reference of the collateral
        bridgingLoanType:
          $ref: "#/components/schemas/BridgingLoanType"
      additionalProperties: false

    InterestOffer:
      required:
        - interestComposition
        - interestOfferDate
      type: object
      description: |
        * interestComposition - Group containing interest composition information
      properties:
        interestOfferDate:
          type: string
          description: Date of the interest offer
          format: date
        interestCorrectionRequired:
          type: boolean
          description: Indicator if Interestcorrection is required
        interestComposition:
          $ref: "#/components/schemas/InterestComposition"
      additionalProperties: false

    InterestComposition:
      required:
        - finalRate
      type: object
      properties:
        finalRate:
          type: number
          description: The sum of the baserate and interestcomponent percentages
          format: decimal
        interestCorrection:
          type: number
          description: The interestcorrection percentage
          format: decimal
        interestComponentCollection:
          $ref: "#/components/schemas/InterestComponentCollection"
      additionalProperties: false

    InsuranceReferenceCollection:
      required:
        - insuranceReferences
      type: object
      properties:
        insuranceReferences:
          type: array
          items:
            type: string
            format: uuid
          description: Reference of the reference linked to the loan as stated in the object 'Insurance'
      additionalProperties: false
    
    InterestComponentCollection:
      required:
        - interestComponents
      type: object
      properties:
        interestComponents:
          minItems: 1
          type: array
          description: Group containing one or more interest component
          items:
            $ref: "#/components/schemas/interestComponent"
      additionalProperties: false

    interestComponent:
      required:
        - interestComponentType
        - name
      type: object
      properties:
        interestComponentType:
          type: string
          description: Type of the interest component
        name:
          type: string
          description: Name of the interest component
      additionalProperties: false
    
    ################################################################################################################################################
    #  Registration
    ################################################################################################################################################

    RegistrationCollection:
      required:
        - registrations
      type: object
      properties:
        registrations:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/Registration'
          description: Group containing one or more registrations
      additionalProperties: false
    
    Registration:
      required:
        - mortgageRegistrationAmount
        - registrationReference
        - rankingOfMortgageRegistration
        - isNew
      type: object
      properties:
        registrationReference:
          type: string
          format: uuid
          description: Reference of the registration
        mortgageRegistrationAmount:
          minimum: 0
          type: number
          description: Amount of the mortgage registration
          format: decimal
        rankingOfMortgageRegistration:
          type: integer
          description: Rank of the registration
        registrationType:
          $ref: "#/components/schemas/RegistrationType"
        isNew:
          type: boolean
          description: Indicates if this is a newly added registration, or an existing registration from the back-office
      additionalProperties: false

    ################################################################################################################################################
    #  DeedPassingInformation
    ################################################################################################################################################

    DeedPassingInformation:
      required:
        - expectedClosingDate
      type: object
      properties:
        echNotaryReference:
          type: string
          description: Reference to a ECH notary
        expectedClosingDate:
          type: string
          description: The expected closing date
          format: date
        postalCodeNotary:
          type: string
