          type: string
          description: Country
        propertyStatus:
          $ref: "#/components/schemas/PropertyStatus"
        marketValue:
          minimum: 0
          type: number
          description: Market value
          format: decimal
        isSold:
          type: boolean
          description: Indicator if collateral is sold.
        sellingPrice:
          minimum: 0
          type: number
          description: Selling price
          format: decimal
        dateOfResolutiveConditions:
          type: string
          description: Date of resolutive conditions
          format: date
        realEstateRentalType:
          $ref: "#/components/schemas/RealEstateRentalType"
        saleConditions:
