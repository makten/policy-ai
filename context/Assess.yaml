      properties:
        realEstateType:
          $ref: "#/components/schemas/RealEstateType"
        specificHouseType:
          $ref: "#/components/schemas/SpecificHouseType"
        realEstateReference:
          type: string
          format: uuid
          description: Technical reference (GUID) of a real estate
        buildingType:
          allOf:
            - $ref: "#/components/schemas/BuildingType"
          description: Group containing rebuilding information
        isToBeFinanced:
          type: boolean
          description: Indicates if the real estate is to be financed
        mainResidence:
          type: boolean
          description: Indicates if the real estate is the main residence
        isCooperativeHouse:
          type: boolean
          description: Indicates if it's a cooperative house
        hasCooperativeRestrictiveOwnership:
          type: boolean
          description: Indicates if cooperative restrictive ownership is applicable
        valuation:
          $ref: "#/components/schemas/Valuation"
        yearOfConstruction:
          pattern: '^\d{1,4}$'
          type: integer
          description: Year of construction
          format: int32
        hasPurchasingCosts:
          type: boolean
          description: Indicates if purchasing costs is in order.
        ownerOccupied:
          type: boolean
          description: Indicates if the real estate is owner occupied
        ownershipPercentage:
          minimum: 0
          type: number
          description: The percentage of ownership on the real estate
          format: decimal
        energyLabel:
          $ref: "#/components/schemas/EnergyLabel"
        realEstateOwnerCollection:
          $ref: "#/components/schemas/RealEstateOwnerCollection"
        landRegistryInfoCollection:
          $ref: "#/components/schemas/LandRegistryInfoCollection"
        country:
