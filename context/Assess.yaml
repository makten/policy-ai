        - hasPurchasingCosts
        - isCooperativeHouse
        - isHomeOfApplication
        - isToBeFinanced
        - mainResidence
        - ownerOccupied
        - propertyStatus
        - realEstateReference
        - realEstateRentalType
        - valuation
        - isCommune
        - hasGarage
        - isHolidayHome
      type: object
      description: |
        * valuation - Group containing valuation information
        * energyLabel - Indicates the type of energy label
        * realEstateOwnerCollection - Group containing one or more real estate owners
        * landRegistryInfoCollection - Group containing one or more land registry information
        * propertyStatus - Property status
        * currentMortgageCollection - Group containing current mortgages
        * realEstateRentalType - Type of rental agreement. Used for setting RealEstateRentedFlag in BWF-mapping
